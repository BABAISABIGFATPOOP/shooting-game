name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pygame pyinstaller
      - run: pyinstaller --onefile --noconsole --name AimTrainer --icon target.ico aim_trainer.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/AimTrainer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pygame pyinstaller
      - run: pyinstaller --onefile --noconsole --name AimTrainer aim_trainer.py
      - run: |
          cd dist
          zip -r AimTrainer-macOS.zip AimTrainer.app 2>/dev/null || zip AimTrainer-macOS.zip AimTrainer
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/AimTrainer-macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: windows
      - uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: macos
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/AimTrainer.exe
            macos/AimTrainer-macOS.zip
